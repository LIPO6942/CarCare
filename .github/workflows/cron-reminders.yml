name: Daily Maintenance Reminders Cron

on:
  schedule:
    - cron: '0 8 * * *' # Every day at 08:00 UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call Reminders API
        run: |
          curl -X GET "https://car-care-neon.vercel.app/api/cron/reminders?key=${{ secrets.CRON_SECRET }}"
